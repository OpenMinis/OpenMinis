name: 🐛 Bug Report
description: Report a bug or unexpected behavior in Minis
title: "[Bug] "
labels: ["bug", "triage"]
body:
  - type: textarea
    id: summary
    attributes:
      label: 📝 Problem Summary / 问题描述
      description: |
        A clear and concise description of the bug.
        简要描述遇到的问题。
      placeholder: |
        e.g. App crashes when switching between models.
        例：切换模型时应用闪退。
    validations:
      required: true

  - type: markdown
    attributes:
      value: "## 📱 Basic Information / 基本信息"

  - type: dropdown
    id: platform
    attributes:
      label: Platform / 平台
      options:
        - iOS
        - Android
    validations:
      required: true

  - type: input
    id: os-version
    attributes:
      label: OS Version / 系统版本
      placeholder: "e.g. iOS 18.4.1 / Android 15"
    validations:
      required: true

  - type: input
    id: app-version
    attributes:
      label: Minis Version / 应用版本
      description: Found in Settings → About / 在「设置 → 关于」中查看
      placeholder: "e.g. 1.2.3 (build 456)"
    validations:
      required: true

  - type: input
    id: device
    attributes:
      label: Device Model / 设备型号
      placeholder: "e.g. iPhone 16 Pro / Pixel 9"
    validations:
      required: false

  - type: textarea
    id: steps
    attributes:
      label: 🔁 Steps to Reproduce / 重现步骤
      description: Step-by-step instructions to reproduce the issue. / 按步骤描述如何复现问题。
      placeholder: |
        1. Open Minis and go to ...
        2. Tap on ...
        3. See error ...
    validations:
      required: false

  - type: textarea
    id: error-info
    attributes:
      label: ❌ Error Details / 错误信息
      description: |
        Paste any error messages, or attach screenshots below.
        粘贴错误信息，或在下方附上截图。
      placeholder: |
        Error message / 错误信息：
        ```
        paste error here
        ```
    validations:
      required: false

  - type: textarea
    id: expected
    attributes:
      label: ✅ Expected Behavior / 预期结果
      description: What did you expect to happen? / 你期望发生什么？
      placeholder: |
        e.g. The model should switch without crashing.
        例：模型应该正常切换，不应闪退。
    validations:
      required: false

  - type: textarea
    id: extra
    attributes:
      label: 🗂️ Additional Information / 其他辅助信息
      description: |
        Crash logs, diagnostic reports, screen recordings, or any other helpful context.
        闪退日志、诊断报告、录屏或其他有助于分析的信息。
      placeholder: |
        - Crash log / 闪退日志
        - Console output / 控制台输出
        - Screen recording / 录屏
    validations:
      required: false
